version: "3"

# Self-contained task runner for the Gloam extension.
# (The npm scripts in package.json run the same tools, for CI / npx users.)

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install dev tooling
    cmds:
      - npm install

  run:
    desc: Launch Firefox with the extension loaded + auto-reload
    cmds:
      - npx web-ext run

  run:chromium:
    desc: Launch Chromium with the generated Chromium extension + auto-reload
    cmds:
      - task: build:chromium-source
      - npx web-ext run --source-dir=dist/chromium --target=chromium

  lint:
    desc: Run every check (Firefox/Chromium package checks + eslint + stylelint + prettier)
    cmds:
      - task: lint:firefox
      - task: lint:chromium
      - task: lint:js
      - task: lint:css
      - task: format:check

  lint:firefox:
    desc: Validate the root Firefox manifest/packaging with web-ext
    cmds:
      - npx web-ext lint

  lint:chromium:
    desc: Generate and validate the Chromium manifest/packaging
    cmds:
      - task: build:chromium-source
      - node scripts/lint-chromium.js

  lint:js:
    desc: Lint JavaScript with ESLint
    cmds:
      - npx eslint .

  lint:css:
    desc: Lint CSS with Stylelint
    cmds:
      - npx stylelint "**/*.css"

  format:
    desc: Format with Prettier (writes changes)
    cmds:
      - npx prettier --write .

  format:check:
    desc: Check formatting without writing
    cmds:
      - npx prettier --check .

  test:
    desc: Run unit tests
    cmds:
      - node --test test/*.test.js

  coverage:
    desc: Run tests with coverage (writes coverage/lcov.info)
    cmds:
      - npx c8 node --test test/*.test.js

  build:chromium-source:
    desc: Generate dist/chromium with a Chromium MV3 service-worker manifest
    cmds:
      - node scripts/build-chromium.js

  build:
    desc: Build an installable .zip into web-ext-artifacts/
    cmds:
      # Packaging options (overwriteDest, ignoreFiles) live in package.json -> webExt.
      - npx web-ext build

  build:chromium:
    desc: Build the Chromium ZIP into web-ext-artifacts/chromium/
    cmds:
      - task: build:chromium-source
      - npx web-ext build --source-dir=dist/chromium --artifacts-dir=web-ext-artifacts/chromium --overwrite-dest

  build:all:
    desc: Build Firefox and Chromium packages
    cmds:
      - task: build
      - task: build:chromium

  sign:
    desc: Sign as "unlisted" for permanent personal install (needs AMO API keys)
    cmds:
      - npx web-ext sign --channel=unlisted
